    label: "Blanton et al. 2003 (SDSS luminosity function)"
    bibcode: "2003ApJ...592..819B"
    doi: "10.1086/375776"
    arxiv_id: "astro-ph/0210215"
    verified: { year: 2003, citation_count: 987 }
    keyphrases:
      - "SDSS"
      - "color bimodality"
      - "luminosity function"
      - "red sequence"
      - "blue cloud"
      - "stellar mass"
      - "spectroscopic survey"

  - claim_id: 1638
    text_guard: "establishing the bimodal color distribution separated at"
    label: "Kauffmann et al. 2003 (SDSS stellar masses)"
    bibcode: "2003MNRAS.341...33K"
    doi: "10.1046/j.1365-8711.2003.06291.x"
    arxiv_id: "astro-ph/0204055"
    verified: { year: 2003, citation_count: 2322 }
    keyphrases:
      - "SDSS"
      - "stellar mass"
      - "star formation history"
      - "color bimodality"
      - "structural transition"
      - "4000 angstrom break"
      - "surface mass density"

  - claim_id: 1638
