      - "baryon budget"
      - "baryon density"
      - "cosmic baryon"
      - "mass assembly"
    notes: >
      Cosmic stellar mass density / baryon inventory. Existing ev 20767.

  # ---------------------------------------------------------------------------
  # TIER 2 — SDSS bimodality cluster (claim 1638 names Blanton 2003 + Kauffmann
  # 2003; the bimodality discovery lineage adds Strateva 2001 + Baldry 2004).
  # Multiple seminal bibcodes legitimately map to the same claim.
  # ---------------------------------------------------------------------------

  - claim_id: 1638
