    label: "Strateva et al. 2001 (SDSS color separation)"
    bibcode: "2001AJ....122.1861S"
    doi: "10.1086/323301"
    arxiv_id: "astro-ph/0107201"
    verified: { year: 2001, citation_count: 1516 }
    keyphrases:
      - "color separation"
      - "color bimodality"
      - "early-type"
      - "late-type"
      - "SDSS"
      - "u-r color"
      - "galaxy classification"
    notes: >
      Strateva 2001 is the first-discovery paper of SDSS color bimodality;
      bound to 1638 as the origin of the bimodal-distribution statement even
      though the claim names Blanton/Kauffmann for the 700k-galaxy figure.

  # ---------------------------------------------------------------------------
  # TIER 3 — Theory/simulation foundations (hierarchical assembly + feedback
