# =============================================================================
# seminal_claims.yaml — Citation Context Mining (CCM) seed registry
# =============================================================================
# Authoritative, human-reviewed mapping of baseline historical/theoretical
# NebulaMind claims to their canonical source paper(s) (ADS bibcodes).
#
# Author:   Kun (analyst) — authored 2026-06-07
# Reviewer: HwaO (approved CCM design v1, 2026-06-07)
# Design:   docs/citation_context_mining_design_v1.md  (§2 Seminal Claim Mapping)
# Loader:   scripts/ccm_seed_seminal_map.py  → upserts into table seminal_claim_map
#
# -----------------------------------------------------------------------------
# PROVENANCE — every bibcode below was resolved and verified against NASA ADS
# on 2026-06-07 using settings.ADS_API_KEY (app.services.paper_search.ads_search).
# The `verified` block on each entry records year + citation_count AT AUDIT TIME,
# so a future reviewer can detect if a bibcode was silently swapped.
# DOIs and arXiv IDs are likewise ADS-resolved, not hand-typed.
#
# -----------------------------------------------------------------------------
# BINDING MODEL (per HwaO directive 2026-06-07: bind to REAL claim IDs)
# Each mapping carries BOTH:
#   * claim_id   — the explicit, resolved Page-57 claim primary key (fast, exact).
#   * text_guard — a verbatim substring that MUST be present in claims.text at
#                  load time. The loader ABORTS the row if the guard is absent
#                  (claim was rewritten / re-IDed). This is the drift tripwire
#                  that makes hardcoded IDs safe against autowiki rewrites.
# If claim_id resolution and text_guard disagree, the loader trusts NEITHER and
# emits the row to a review file (see scripts/ccm_seed_seminal_map.py --dry-run).
#
# -----------------------------------------------------------------------------
# SCOPE — this seed covers ONLY:
#   page_id 57  ("Galaxy Evolution", slug: galaxy-evolution)
#   section     "Overview & Historical Foundations"
# All 14 target claims were confirmed page_id=57, correct section,
# trust_level=unverified at audit time. CCM is intentionally NOT corpus-wide.
#
# keyphrases — reused verbatim by the Stage-3 extractor on-topic gate and the
# Stage-4 Pico classifier (design §2.6 / §4.5 / §6.4). A citing paper whose
# context sentence shares ZERO keyphrases with the claim is dropped pre-LLM.
# =============================================================================

meta:
  page_id: 57
  page_slug: galaxy-evolution
  section: "Overview & Historical Foundations"
  audited_by: kun
  audited_at: "2026-06-07"
  ads_verified: true
  notes: >
    Citation counts are ADS values at audit time (2026-06-07) and will drift
    upward; they are recorded for provenance/anti-swap auditing, not as gates.

mappings:

  # ---------------------------------------------------------------------------
  # TIER 1 — Direct attributions (claim text explicitly names the seminal work).
  # These are the highest-fidelity CCM targets: the claim itself credits the
  # historical paper, so modern introductory citations of that paper are the
  # exact corroboration CCM is designed to harvest.
  # ---------------------------------------------------------------------------

  - claim_id: 1631
    text_guard: "White & Rees (1978) established the conceptual framework for baryon condensation"
    label: "White & Rees 1978"
    bibcode: "1978MNRAS.183..341W"
    doi: "10.1093/mnras/183.3.341"
    arxiv_id: null            # pre-print era; no arXiv ID exists
    verified: { year: 1978, citation_count: 3979 }
    keyphrases:
      - "radiative cooling"
      - "gas cooling"
      - "dark matter halo"
      - "baryon condensation"
      - "two-stage"
      - "cooling time"
      - "gas infall"
      - "hierarchical"
    notes: >
      The canonical gas-cooling-in-halos result. Already has 1 old supporting
      evidence row (ev 21078, year 1978, q=0.40); CCM supplies the recent
      citers needed to clear n_supports>=3 and defeat the freshness floor.

  - claim_id: 1632
    # NOTE: claim text has an embedded <!--claim:1579--> marker right after "The ",
    # so the guard must be a span that does NOT cross the marker. Loader should
    # ALSO strip <!--claim:N--> markers before matching (design normalize_claim_text).
    text_guard: "measured the primordial power spectrum"
    label: "Planck Collaboration 2020 (2018 results X, inflation)"
    bibcode: "2020A&A...641A..10P"
    doi: "10.1051/0004-6361/201833887"
    arxiv_id: "1807.06211"
    verified: { year: 2020, citation_count: 3708 }
    keyphrases:
      - "primordial power spectrum"
      - "spectral index"
      - "scalar tilt"
      - "n_s"
      - "initial conditions"
      - "inflation"
      - "CMB anisotropies"
      - "Planck"
    notes: >
      Claim cites n_s = 0.9649 ± 0.0042 — that is the inflation paper (X), not
      the cosmological-parameters paper (VI). Bibcode disambiguated via ADS
      title match on "Constraints on inflation".

  - claim_id: 1634
    # Embedded <!--claim:1580--> marker after "employed a "; use post-marker span.
    text_guard: "comoving box with 2160"
    label: "Springel et al. 2005 (Millennium Simulation)"
    bibcode: "2005Natur.435..629S"
    doi: "10.1038/nature03597"
    arxiv_id: "astro-ph/0504097"
    verified: { year: 2005, citation_count: 4450 }
    keyphrases:
      - "N-body simulation"
      - "Millennium Simulation"
      - "large-scale structure"
      - "two-point correlation function"
      - "galaxy clustering"
      - "halo merger tree"
      - "comoving box"
    notes: >
      Claim 1634 currently has ZERO evidence rows despite naming Springel 2005
      explicitly — a prime CCM target (high modern-citer volume expected).

  - claim_id: 1642
    text_guard: "AGN feedback is invoked to truncate star formation in halos exceeding"
    label: "Croton et al. 2006"
    bibcode: "2006MNRAS.365...11C"
    doi: "10.1111/j.1365-2966.2005.09675.x"
    arxiv_id: "astro-ph/0508046"
    verified: { year: 2006, citation_count: 3636 }
    keyphrases:
      - "AGN feedback"
      - "radio mode"
      - "cooling flow"
      - "semi-analytic"
      - "star formation truncation"
      - "massive halo"
      - "virial temperature"
    notes: >
      Claim 1642 has ZERO evidence despite citing Croton 2006. Canonical
      radio-mode AGN feedback SAM paper.

  - claim_id: 1639
    text_guard: "the green valley contains fewer than 15% of galaxies at fixed stellar mass"
    label: "Schawinski et al. 2014"
    bibcode: "2014MNRAS.440..889S"
    doi: "10.1093/mnras/stu327"
    arxiv_id: "1402.4814"
    verified: { year: 2014, citation_count: 689 }
    keyphrases:
      - "green valley"
      - "quenching timescale"
      - "blue cloud"
      - "red sequence"
      - "morphology"
      - "transition timescale"
      - "Galaxy Zoo"
    notes: >
      Claim names Schawinski 2014 for the green-valley quench-timescale result;
      currently backed only by Faber 2007 (ev 20766). CCM adds modern citers.

  - claim_id: 1648
    text_guard: "The cosmic stellar mass density at z = 0"
    label: "Fukugita & Peebles 2004"
    bibcode: "2004ApJ...616..643F"
    doi: "10.1086/425155"
    arxiv_id: "astro-ph/0406095"
    verified: { year: 2004, citation_count: 512 }
