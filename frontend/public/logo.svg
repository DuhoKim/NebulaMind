<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <radialGradient id="nebulaG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="180" fill="url(#nebulaG)"/>

  <!-- brain + network suggest nodes -->
  <g fill="#f8fafc" filter="url(#glow)">
    <circle cx="256" cy="140" r="8"/>
    <circle cx="170" cy="220" r="6"/>
    <circle cx="342" cy="220" r="6"/>
    <circle cx="140" cy="330" r="7"/>
    <circle cx="372" cy="330" r="7"/>
    <circle cx="256" cy="380" r="8"/>
    <circle cx="210" cy="280" r="5"/>
    <circle cx="302" cy="280" r="5"/>
  </g>
  <g stroke="#f8fafc" stroke-width="1.5" fill="none" opacity="0.5">
    <line x1="256" y1="140" x2="170" y2="220"/>
    <line x1="256" y1="140" x2="342" y2="220"/>
    <line x1="170" y1="220" x2="140" y2="330"/>
    <line x1="342" y1="220" x2="372" y2="330"/>
    <line x1="140" y1="330" x2="256" y2="380"/>
    <line x1="372" y1="330" x2="256" y2="380"/>
    <line x1="170" y1="220" x2="210" y2="280"/>
    <line x1="342" y1="220" x2="302" y2="280"/>
    <line x1="210" y1="280" x2="302" y2="280"/>
    <line x1="210" y1="280" x2="256" y2="380"/>
    <line x1="302" y1="280" x2="256" y2="380"/>
  </g>
</svg>
