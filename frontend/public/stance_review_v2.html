    .seg button:last-child { border-right:0; }
    .seg button.active { background:#18202a; color:#fff; }
    .flip-select { width:auto; min-width:150px; min-height:34px; padding:6px 8px; }
    .changed { color:var(--blue); font-weight:700; font-size:13px; }

be74e8b5e9a903aa6ef", "page_version_id": 6189, "label_source": "qwen_default", "review_id": "pair-2695"}];
    const STORAGE_KEY = 'page58_stance_review_v2_decisions';
    const labelOrder = {contradicts:0, neither:1, supports:2};
    const labels = ['supports','contradicts','neither'];
    const state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    const cards = document.getElementById('cards');
    const statusEl = document.getElementById('status');
    const labelFilter = document.getElementById('labelFilter');
    const bucketFilter = document.getElementById('bucketFilter');
    const flagFilter = document.getElementById('flagFilter');
    const esc = value => String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    const fmt = value => Number.isFinite(Number(value)) ? Number(value).toFixed(3) : 'n/a';
    function rowKey(row) { return row.review_id || row.gold_id; }
    function currentDecision(row) { return state[rowKey(row)] || {mode:'agree', papa_label:row.draft_label}; }
    function saveDecision(row, decision) { state[rowKey(row)] = decision; localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); render(); }
    function papaLabel(row) { const d=currentDecision(row); return d.mode === 'agree' ? row.draft_label : d.papa_label; }
    function isChanged(row) { return papaLabel(row) !== row.draft_label; }
    function why(row) {
      const bits=[];
      if (row.panel_disagreement) bits.push('qwen and gpt disagree');
      if (row.qwen_default) bits.push('qwen_default after no tie-break');
      if (row.claude_cap_exhausted_disagreement) bits.push('Claude cap exhausted on disagreement');
      if ((row.papa_attention_flags||[]).includes('sub_tau_relevance_boundary')) bits.push('sub-τ relevance boundary');
      for (const f of row.papa_attention_flags || []) if (!['qwen_gpt_disagreement','qwen_default','claude_cap_exhausted_disagreement','sub_tau_relevance_boundary','rare_or_boundary_class'].includes(f)) bits.push(f.replaceAll('_',' '));
      if ((row.papa_attention_flags||[]).includes('rare_or_boundary_class')) bits.push('rare/boundary class');
      return bits.length ? bits.join(' · ') : 'Not flagged; control row.';
    }
    function renderReview(row) {
      const d=currentDecision(row);
      const alternatives = labels.filter(l => l !== row.draft_label);
      const flipValue = d.mode === 'flip' && alternatives.includes(d.papa_label) ? d.papa_label : alternatives[0];
      return `<div class="review" data-key="${esc(rowKey(row))}">
        <span>Review:</span>
        <span class="seg">
          <button class="review-btn ${d.mode==='agree'?'active':''}" data-mode="agree">Agree</button>
          <button class="review-btn ${d.mode==='flip'?'active':''}" data-mode="flip">Flip</button>
          <button class="review-btn ${d.mode==='unsure'?'active':''}" data-mode="unsure">Unsure</button>
        </span>
        <select class="flip-select" ${d.mode==='flip'?'':'disabled'}>${alternatives.map(l=>`<option value="${l}" ${l===flipValue?'selected':''}>flip → ${l}</option>`).join('')}</select>
        ${isChanged(row)?`<span class="changed">changed: papa_label=${esc(papaLabel(row))}</span>`:''}
      </div>`;
    }
    function card(row) {
      const ct = row.claude_tiebreak ? 'Claude tie-break' : 'no Claude tie-break';
      return `<article class="card" data-key="${esc(rowKey(row))}">
        <div class="card-head">
          <div class="meta"><strong>${esc(row.gold_id)}</strong><span>${esc(row.arxiv_id)}</span><span>${esc(row.sample_bucket)}</span><span>cos=${fmt(row.max_cosine)}</span><span>S${esc(row.sentence_index)}</span>${row.papa_attention?'<span class="flag">Papa attention</span>':''}</div>
          <span class="badge ${esc(row.draft_label)}">${esc(row.draft_label)}</span>
        </div>
        <div class="body">
          <div class="sentences"><section class="sentence"><h2>Intro assertion</h2><p>${esc(row.intro_sentence)}</p></section><section class="sentence"><h2>Base sentence</h2><p>${esc(row.base_sentence)}</p></section></div>
          <div class="panel"><div><strong>qwen</strong>: ${esc(row.qwen_label)} (${fmt(row.qwen_confidence)}) — ${esc(row.qwen_reason)}</div><div><strong>gpt</strong>: ${esc(row.gpt_label)} (${fmt(row.gpt_confidence)}) — ${esc(row.gpt_reason)}</div></div>
          <div class="why"><strong>Why flagged:</strong> ${esc(why(row))} <span>· ${ct}</span></div>
          ${renderReview(row)}
        </div>
      </article>`;
    }
    function visibleRows() {
      return ROWS.filter(row => labelFilter.value==='all' || row.draft_label===labelFilter.value)
        .filter(row => bucketFilter.value==='all' || row.sample_bucket===bucketFilter.value)
        .filter(row => flagFilter.value==='all' || (flagFilter.value==='flagged' ? row.papa_attention : isChanged(row)))
        .sort((a,b) => Number(Boolean(b.papa_attention))-Number(Boolean(a.papa_attention)) || labelOrder[a.draft_label]-labelOrder[b.draft_label] || String(a.gold_id).localeCompare(String(b.gold_id)));
    }
    function render() {
      const rows=visibleRows();
      statusEl.textContent = `${rows.length} visible · ${ROWS.filter(isChanged).length} changed locally`;
      cards.innerHTML = rows.map(card).join('');
      cards.querySelectorAll('.review').forEach(el => {
        const row = ROWS.find(r => rowKey(r) === el.dataset.key);
        el.querySelectorAll('.review-btn').forEach(btn => btn.addEventListener('click', () => {
          const mode = btn.dataset.mode;
          const flip = el.querySelector('.flip-select').value;
          saveDecision(row, {mode, papa_label: mode==='agree' ? row.draft_label : mode==='unsure' ? 'unsure' : flip});
        }));
        el.querySelector('.flip-select').addEventListener('change', ev => saveDecision(row, {mode:'flip', papa_label:ev.target.value}));
      });
    }
    function exportChanged() {
      const changed = ROWS.filter(isChanged).map(row => ({pair_id: row.pair_id || row.gold_id, draft_label: row.draft_label, papa_label: papaLabel(row)}));
      const payload = JSON.stringify(changed, null, 2);
      document.getElementById('exportText').textContent = payload;
      navigator.clipboard?.writeText(payload).catch(() => {});
      const blob = new Blob([payload], {type:'application/json'});
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'page58_stance_review_decisions.json'; a.click(); URL.revokeObjectURL(a.href);
      document.getElementById('exportDialog').showModal();
    }
    [labelFilter,bucketFilter,flagFilter].forEach(el => el.addEventListener('change', render));
    document.getElementById('exportBtn').addEventListener('click', exportChanged);
    document.getElementById('closeDialog').addEventListener('click', () => document.getElementById('exportDialog').close());
    render();
  </script>
</body>
